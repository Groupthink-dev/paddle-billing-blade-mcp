name: paddle-billing-blade-mcp
description: >
  Paddle Billing API operations — products, prices, subscriptions,
  transactions, webhooks. Token-efficient with pipe-delimited output,
  field selection, and human-readable money formatting. Write-gated
  with confirm gate for destructive operations.
version: 0.1.0
author: groupthink-dev
licence: MIT
tier: certified
contract: billing-v1
repository: https://github.com/groupthink-dev/paddle-billing-blade-mcp

install:
  runtime: uv
  package: paddle-billing-blade-mcp

environment:
  required:
    - PADDLE_API_KEY
    - PADDLE_ENVIRONMENT
  optional:
    - PADDLE_WRITE_ENABLED
    - PADDLE_WEBHOOK_SECRET
    - PADDLE_MCP_API_TOKEN
    - PADDLE_MCP_TRANSPORT
    - PADDLE_MCP_HOST
    - PADDLE_MCP_PORT

tools: 40
